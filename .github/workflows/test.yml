name: Test

on:
  # Run on pushes to main (i.e. post-merge) and on PRs targeting main. Limiting
  # the push trigger to main avoids the duplicate run that otherwise happens
  # when a commit is pushed to a PR branch (push + pull_request both fire).
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Ensures that only the latest commit of a PR can execute the actions.
# Useful for cancelling job when a sequence of commits are quickly added.
concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5
      - name: Install dependencies
        working-directory: rio
        run: | 
          opam install . --deps-only
      - name: Rio tests
        working-directory: rio
        run: |
          opam exec -- dune build
          opam exec -- dune test

